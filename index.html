<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Color Gradient Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="container">
        <h1>Color Gradient Generator</h1>

        <div class="input-group">
            <label>Enter Colors:</label>
            <input type="text" id="colorInput" placeholder="e.g. red, blue, green">
        </div>

        <div class="scheme-buttons">
            <button class="scheme-btn active" id="linearBtn">Linear</button>
            <button class="scheme-btn" id="radialBtn">Radial</button>
            <button class="scheme-btn" id="conicBtn">Conic</button>
            <button class="scheme-btn" id="diamondBtn">Diamond</button>
            <button class="scheme-btn" id="reflectedBtn">Reflected</button>
        </div>

        <div class="preview" id="gradientPreview"></div>

        <div class="code-output" id="cssCode">
            /* CSS code will appear here */
        </div>
    </div>
</body>

</html>
